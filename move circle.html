<!DOCTYPE html>
<html lang="en">

<head>
    <title>Mlock Circular Process Animation</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 100px auto;
        }

        .circle {
            width: 100%;
            height: 100%;
            position: absolute;
            border: 2px dashed #18ee18;
            border-radius: 50%;
        }

        .box {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: red;
            position: absolute;
            transition: all 0.5s ease-in-out;
        }

        .label {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            color: #0a1904;
        }

        .label:nth-child(2) {
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Download */
        .label:nth-child(3) {
            top: 25%;
            right: -10px;
            transform: translateX(50%);
        }

        /* Booking */
        .label:nth-child(4) {
            bottom: 25%;
            right: -10px;
            transform: translateX(50%);
        }

        /* Pay */
        .label:nth-child(5) {
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Unlock */
        .label:nth-child(6) {
            bottom: 25%;
            left: -10px;
            transform: translateX(-50%);
        }

        /* Store Luggage */
        .label:nth-child(7) {
            top: 25%;
            left: -10px;
            transform: translateX(-50%);
        }

        /* Enjoy */
    </style>
</head>

<body>
    <h1>Mlock Circular Process Animation</h1>
    <div class="container">
        <div class="circle"></div>
        <div class="label">Download</div>
        <div class="label">Booking</div>
        <div class="label">Pay</div>
        <div class="label">Unlock</div>
        <div class="label">Store Luggage</div>
        <div class="label">Enjoy</div>
        <div class="box" id="movingBox"></div>
    </div>

    <script>
        const box = document.getElementById("movingBox");
        const positions = [
            { top: "-10px", left: "50%" },  // Download
            { top: "25%", left: "100%" },   // Booking
            { top: "75%", left: "100%" },   // Pay
            { top: "100%", left: "50%" },  // Unlock
            { top: "75%", left: "0%" },    // Store Luggage
            { top: "25%", left: "0%" }     // Enjoy
        ];

        let index = 0;
        function moveBox() {
            box.style.top = positions[index].top;
            box.style.left = positions[index].left;
            index = (index + 1) % positions.length;
            setTimeout(moveBox, 2000); // 2-second delay
        }

        moveBox();
    </script>
</body>

</html>
