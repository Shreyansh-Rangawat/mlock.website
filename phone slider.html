<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mlock Plans</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .body {
            display: flex;
            align-items: center;
            gap: 50px;
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .content {
            max-width: 400px;
        }

        .checkmark {
            color: green;
            font-size: 20px;
        }

        .phone-container {
            position: relative;
            width: 200px;
            height: 400px;
            overflow: hidden;
            border: 10px solid #333;
            border-radius: 20px;
            background: #ddd;
        }

        .slider-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            background: #ccc;
        }

        .prev,
        .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .prev {
            left: -30px;
        }

        .next {
            right: -30px;
        }

        .dots {
            text-align: center;
            margin-top: 10px;
        }

        .dot {
            height: 10px;
            width: 10px;
            margin: 0 5px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
        }

        .active {
            background-color: #717171;
        }
    </style>
</head>

<body>
    <section class="body">
        <div class="content">
            <p><span class="checkmark">✅</span> Choose from minute-based, hourly, and daily plans.</p>
            <p><span class="checkmark">✅</span> Safe & secure luggage storage—anytime, anywhere.</p>
            <p><span class="checkmark">✅</span> Service available 24/7.</p>
        </div>
        <div class="phone-container">
            <div class="slider-container">
                <div class="slides">
                    <div class="slide"></div> <!-- First Slide (Image Background) -->
                    <div class="slide">Jain</div>
                    <div class="slide">Hello</div>
                </div>
            </div>
            <button class="prev" onclick="moveSlide(-1)">&#11178;</button>
            <button class="next" onclick="moveSlide(1)">&#11179;</button>
        </div>
        <div class="dots">
            <span class="dot" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
        </div>
    </section>
    <script>
        let index = 0;
        const slides = document.querySelector('.slides');
        const dots = document.querySelectorAll('.dot');

        function moveSlide(n) {
            index += n;
            if (index >= 3) index = 2;
            if (index < 0) index = 0;
            updateSlider();
        }

        function currentSlide(n) {
            index = n;
            updateSlider();
        }

        function updateSlider() {
            slides.style.transform = `translateX(-${index * 100}%)`;
            dots.forEach(dot => dot.classList.remove('active'));
            dots[index].classList.add('active');
        }

        updateSlider();
    </script>
</body>

</html>
