<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mlock | Secure Your Belongings Seamlessly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- icon-libery -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="playstore.css" />
    <style>
        /* Logo: M in white, lock in dark green */
        .logo-container {
            display: flex;
            align-items: center;
            background-color: black;
            padding: 5px 20px;
            border-radius: 15px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: bold;
            font-family: 'Trebuchet MS', sans-serif;
        }

        .logo-m {
            color: white;
        }

        .logo-lock {
            color: #18ee18;
        }

        .img-logo {
            width: 135px;
            /* Adjust size as needed */
            height: 60px;
            margin-left: 40px;
            margin-right: 80px;
        }

        /* Navigation Hover Effects */
        .nav-link {
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #18ee18;
            text-decoration: underline;
        }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
        }

        .mobile-menu.active {
            display: block;
        }

        /* Download Button */
        .btn-download {
            background-color: #18ee18;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-download:hover {
            background-color: #4b4b4b;
        }
    </style>
</head>

<body class="bg-white text-black">

    <!-- Navbar -->
    <header class="flex justify-between items-center p-6 bg-white shadow-md">
        <!-- Logo -->
        <!-- <div class="logo-container">
            <div class="logo-text">
                <span class="logo-m">M</span><span class="logo-lock">lock</span>
            </div>
        </div> -->
        <a href="https://mlock.in">
            <img class="img-logo" src="Web-logo-img-final1.jpg" alt="Mlock Logo">
        </a>

        <!-- Desktop Navigation -->
        <nav class="hidden md:flex space-x-6">
            <a href="Homefinal.html" class="nav-link">Home</a>
            <a href="Aboutusfinal.html" class="nav-link text-green-500 underline">About Us</a>
            <a href="Safetyfinal.html" class="nav-link">Safety</a>
            <a href="Teamfinal.html" class="nav-link">Team</a>
            <a href="Blogfinal.html" class="nav-link">Blog</a>
            <a href="contactfinal.html" class="nav-link">Contact</a>
        </nav>

        <!-- Mobile Menu Icon -->
        <div class="md:hidden">
            <button id="menu-btn" class="text-3xl">&#9776;</button>
        </div>

        <!-- Download Button -->
        <a href="#" class="hidden md:block btn-download">Download The App</a>
    </header>

    <!-- Mobile Navigation Menu -->
    <nav id="mobile-menu" class="mobile-menu bg-black text-white p-5">
        <a href="Homefinal.html" class="block p-2 nav-link">Home</a>
        <a href="Aboutusfinal.html" class="block p-2 nav-link text-green-500 underline">About Us</a>
        <a href="Safetyfinal.html" class="block p-2 nav-link">Safety</a>
        <a href="Teamfinal.html" class="block p-2 nav-link">Team</a>
        <a href="Blogfinal.html" class="block p-2 nav-link">Blog</a>
        <a href="contactfinal.html" class="block p-2 nav-link">Contact</a>
        <a href="#" class="block p-3 mt-2 bg-green-500 text-white rounded">Download The App</a>
    </nav>





    <!-- JavaScript for Mobile Menu -->
    <script>
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
        });
    </script>

</body>

</html>
