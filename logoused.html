<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mlock App Icon</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: black;
            padding: 20px;
            width: 130px;
            height: 130px;
            border-radius: 25px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            font-family: 'Trebuchet MS', sans-serif;
            text-align: center;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
        }

        .logo-m {
            color: white;
        }

        .logo-lock {
            color: #18ee18;
        }

        .subtitle {
            font-size: 10px;
            color: white;
            margin-top: 5px;
            white-space: nowrap; /* Ensures text stays in one line */
        }

        .subtitle .smart {
            color: #18ee18;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="app-icon">
        <div class="logo-text">
            <span class="logo-m">M</span><span class="logo-lock">lock</span>
        </div>
        <div class="subtitle">
            India's <span class="smart">Smart</span> Luggage Station
        </div>
    </div>
</body>
</html>
